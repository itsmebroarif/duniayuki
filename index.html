<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunia Yuki - Dreamcore Prototype</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #ffc0cb; /* Pastel pink */
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #title {
            color: #fff;
            text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff69b4;
            font-size: 4rem;
            margin-bottom: 10px;
            text-align: center;
        }
        #instructions {
            color: #333;
            background: rgba(255, 255, 255, 0.7);
            padding: 15px 30px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            pointer-events: auto;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        #instructions:hover {
            transform: scale(1.05);
        }
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: none;
        }
    </style>
    <!-- Import Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <h1 id="title">DUNIA YUKI</h1>
        <div id="instructions">
            Klik di sini untuk menjelajah<br><br>
            [W][A][S][D] untuk Berjalan<br>
            [Mouse] untuk Melihat Sekitar
        </div>
    </div>
    <div id="crosshair"></div>

    <script>
        // --- 1. SETUP SCENE, CAMERA, RENDERER ---
        const scene = new THREE.Scene();
        // Langit dan kabut pink (Dreamcore aesthetic)
        const fogColor = new THREE.Color(0xffd1dc); 
        scene.background = fogColor;
        scene.fog = new THREE.Fog(fogColor, 5, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 0); // Tinggi pemain

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- 2. PENCAHAYAAN (LIGHTING) ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); // Cahaya lembut
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffe4e1, 0.6); // Cahaya matahari pastel
        dirLight.position.set(50, 100, 50);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- 3. MATERIAL & TEXTURE GENERATOR ---
        // Membuat tekstur papan catur dengan Canvas API
        const createCheckerboard = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const context = canvas.getContext('2d');
            context.fillStyle = '#111'; // Hitam
            context.fillRect(0, 0, 512, 512);
            context.fillStyle = '#eee'; // Putih
            context.fillRect(0, 0, 256, 256);
            context.fillRect(256, 256, 256, 256);
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(100, 100); // Pengulangan lantai
            return tex;
        };

        // Membuat tekstur papan nama bangunan
        const createSignTexture = (text, bgColor, textColor) => {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, 256, 128);
            ctx.fillStyle = textColor;
            ctx.font = 'bold 30px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 128, 64);
            return new THREE.CanvasTexture(canvas);
        };

        // --- 4. MEMBANGUN DUNIA ---
        // Lantai Papan Catur
        const floorGeo = new THREE.PlaneGeometry(500, 500);
        const floorMat = new THREE.MeshStandardMaterial({ map: createCheckerboard(), roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Jalan Raya
        const roadGeo = new THREE.PlaneGeometry(20, 500);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        road.position.y = 0.01; // Sedikit di atas lantai
        road.receiveShadow = true;
        scene.add(road);

        // Fungsi pembuat bangunan
        const buildings = [];
        const createBuilding = (x, z, w, h, d, color, signText = null) => {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color: color });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, h/2, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            buildings.push(mesh);

            if (signText) {
                const signGeo = new THREE.PlaneGeometry(w * 0.8, h * 0.3);
                const signMat = new THREE.MeshBasicMaterial({ map: createSignTexture(signText, '#fff', '#000') });
                const sign = new THREE.Mesh(signGeo, signMat);
                sign.position.set(x, h + 0.1, z + d/2 + 0.01);
                scene.add(sign);
            }
            return mesh;
        };

        // Fungsi pembuat pohon surealis
        const createTree = (x, z) => {
            const trunkGeo = new THREE.CylinderGeometry(0.2, 0.2, 2);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5c4033 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.set(x, 1, z);
            
            const leavesGeo = new THREE.SphereGeometry(1.5, 8, 8);
            // Daun warnanya pastel aneh-aneh
            const leafColors = [0xffb6c1, 0xdda0dd, 0xadd8e6, 0x98fb98];
            const leavesMat = new THREE.MeshStandardMaterial({ color: leafColors[Math.floor(Math.random()*leafColors.length)] });
            const leaves = new THREE.Mesh(leavesGeo, leavesMat);
            leaves.position.set(x, 2.5, z);
            
            scene.add(trunk);
            scene.add(leaves);
        };

        // Kota Kecil (Micro-city) di sudut
        for(let i=0; i<30; i++) {
            let bw = 2 + Math.random() * 3;
            let bd = 2 + Math.random() * 3;
            let bh = 10 + Math.random() * 30;
            let bx = 50 + Math.random() * 40;
            let bz = 50 + Math.random() * 40;
            createBuilding(bx, bz, bw, bh, bd, 0xe0e0e0);
        }

        // Area Gunung (Representasi Liminal Cone)
        const mountGeo = new THREE.ConeGeometry(30, 40, 32);
        const mountMat = new THREE.MeshStandardMaterial({ color: 0xd8bfd8 }); // Thistle
        const mountain = new THREE.Mesh(mountGeo, mountMat);
        mountain.position.set(-60, 20, -80);
        scene.add(mountain);

        // Membangun Toko & Landmark
        createBuilding(15, 0, 8, 5, 8, 0xffa07a, "Spudsy's");
        createBuilding(-15, 10, 5, 3, 5, 0x8fbc8f, "Warkop");
        createBuilding(-15, -10, 4, 4, 4, 0xfffacd, "Pos Ronda");
        createBuilding(15, 30, 6, 4, 6, 0xe6e6fa, "Cafe");
        createBuilding(15, -20, 3, 3, 3, 0xffe4b5, "Angkringan");

        // Sirkus di kejauhan
        const circusGeo = new THREE.ConeGeometry(10, 15, 8);
        const circusMat = new THREE.MeshStandardMaterial({ color: 0xff69b4 }); // Hot pink
        const circus = new THREE.Mesh(circusGeo, circusMat);
        circus.position.set(-20, 7.5, -60);
        scene.add(circus);

        // Rumah-rumah kosong identik (Suburban)
        for(let z = -80; z < 80; z += 20) {
            if(z > -15 && z < 15) continue; // Kosongkan area tengah
            createBuilding(-30, z, 6, 5, 8, 0xffffff);
            createBuilding(-40, z, 6, 5, 8, 0xffffff);
        }

        // Sebar pohon di sekitar
        for(let i=0; i<50; i++) {
            createTree((Math.random() - 0.5) * 150, (Math.random() - 0.5) * 150);
        }

        // --- 5. HEWAN (NPC SEDERHANA) ---
        const animals = [];
        for(let i=0; i<20; i++) {
            const geo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            // Warna merepresentasikan hewan
            const colors = [0xffffff, 0x000000, 0x8b4513]; 
            const mat = new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random()*colors.length)] });
            const animal = new THREE.Mesh(geo, mat);
            animal.position.set((Math.random() - 0.5) * 60, 0.25, (Math.random() - 0.5) * 60);
            
            // Simpan arah jalan acak
            animal.userData = {
                dirX: (Math.random() - 0.5) * 0.05,
                dirZ: (Math.random() - 0.5) * 0.05
            };
            scene.add(animal);
            animals.push(animal);
        }

        // --- 6. TELEPORTASI PADS ---
        const teleporters = [];
        const createTeleport = (x, z, targetX, targetZ) => {
            const geo = new THREE.CylinderGeometry(2, 2, 0.1, 16);
            const mat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.5 });
            const pad = new THREE.Mesh(geo, mat);
            pad.position.set(x, 0.06, z);
            pad.userData = { targetX, targetZ };
            scene.add(pad);
            teleporters.push(pad);
        };
        // Teleport dari jalan raya ke kota kecil
        createTeleport(0, 20, 60, 60);
        // Teleport dari kota kecil balik ke jalan raya
        createTeleport(60, 50, 0, 10);

        // --- 7. KONTROL PEMAIN (FIRST PERSON) ---
        const move = { forward: false, backward: false, left: false, right: false };
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let isLocked = false;

        const instructions = document.getElementById('instructions');
        const uiLayer = document.getElementById('ui-layer');
        const crosshair = document.getElementById('crosshair');

        // Mouse Lock Logic (PointerLock)
        instructions.addEventListener('click', () => {
            document.body.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                isLocked = true;
                uiLayer.style.display = 'none';
                crosshair.style.display = 'block';
            } else {
                isLocked = false;
                uiLayer.style.display = 'flex';
                crosshair.style.display = 'none';
            }
        });

        // Rotasi Kamera (Mouse)
        const euler = new THREE.Euler(0, 0, 0, 'YXZ');
        document.addEventListener('mousemove', (event) => {
            if (!isLocked) return;
            const movementX = event.movementX || event.mozMovementX || event.webkitMovementX || 0;
            const movementY = event.movementY || event.mozMovementY || event.webkitMovementY || 0;

            euler.setFromQuaternion(camera.quaternion);
            euler.y -= movementX * 0.002;
            euler.x -= movementY * 0.002;
            
            // Batasi lihat atas/bawah
            euler.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, euler.x));
            camera.quaternion.setFromEuler(euler);
        });

        // Keyboard Logic
        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': move.forward = true; break;
                case 'KeyS': move.backward = true; break;
                case 'KeyA': move.left = true; break;
                case 'KeyD': move.right = true; break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': move.forward = false; break;
                case 'KeyS': move.backward = false; break;
                case 'KeyA': move.left = false; break;
                case 'KeyD': move.right = false; break;
            }
        });

        // --- 8. ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Pergerakan Pemain
            if (isLocked) {
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(move.forward) - Number(move.backward);
                direction.x = Number(move.right) - Number(move.left);
                direction.normalize(); // Biar gerak diagonal ga lebih cepat

                const speed = 25.0;
                if (move.forward || move.backward) velocity.z -= direction.z * speed * delta;
                if (move.left || move.right) velocity.x -= direction.x * speed * delta;

                camera.translateX(velocity.x * delta);
                camera.translateZ(velocity.z * delta);

                // Kunci tinggi kamera biar ga terbang
                camera.position.y = 2;

                // Logika Teleportasi
                teleporters.forEach(pad => {
                    const dist = camera.position.distanceTo(pad.position);
                    if(dist < 2) {
                        camera.position.x = pad.userData.targetX;
                        camera.position.z = pad.userData.targetZ;
                    }
                });
            }

            // Animasi Hewan (Berkeliling)
            animals.forEach(animal => {
                animal.position.x += animal.userData.dirX;
                animal.position.z += animal.userData.dirZ;

                // Pantul jika kejauhan
                if(animal.position.x > 80 || animal.position.x < -80) animal.userData.dirX *= -1;
                if(animal.position.z > 80 || animal.position.z < -80) animal.userData.dirZ *= -1;

                // Rotasi hewannya sedikit biar ga kaku
                animal.rotation.y += 0.05;
            });

            renderer.render(scene, camera);
        }

        // Handle Resize layat
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
